<!DOCTYPE html>
<html>
<head>
<title>Print Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;text-align:center;padding:20px;background:#f5f5f5;}
.box{background:white;padding:20px;border-radius:10px;margin:10px auto;max-width:400px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.btn{background:#4CAF50;color:white;padding:12px 25px;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:5px;width:80%;}
.btn2{background:#2196F3;color:white;padding:12px 25px;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:5px;width:80%;}
.btn3{background:#ff9800;color:white;padding:12px 25px;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:5px;width:80%;}
</style>
</head>
<body>
<h1>Photo Print Karo</h1>

<div class="box" id="step1">
<h2>Step 1 - Photo Chuno</h2>
<input type="file" id="photo" accept="image/*"><br><br>
<button class="btn" onclick="step2()">Aage Bado</button>
</div>

<div class="box" id="step2" style="display:none">
<h2>Step 2 - Print Type Chuno</h2><br>
<button class="btn2" id="bw" onclick="selectType('bw')">Black & White - 5 Rupees</button><br><br>
<button class="btn3" id="color" onclick="selectType('color')">Colour - 10 Rupees</button><br><br>
<button class="btn" onclick="step3()">Aage Bado</button>
</div>

<div class="box" id="step3" style="display:none">
<h2>Step 3 - Payment Karo</h2>
<p id="amt" style="font-size:20px;font-weight:bold;color:red;"></p>
<p>Niche QR scan karke payment karo</p>
<img src="/qr" width="220"><br><br>
<p style="color:gray;">Kisi bhi UPI app se scan karo</p>
<p>PhonePe | GPay | Paytm | Any UPI</p>
<br>
<button class="btn" onclick="step4()">Payment Ho Gayi - Print Karo</button>
</div>

<div class="box" id="step4" style="display:none">
<h2>Print Ho Raha Hai!</h2>
<p>Thoda wait karo... 🖨️</p>
</div>

<script>
var printType='';
var amount=0;

function step2(){
var f=document.getElementById('photo').files[0];
if(!f){alert('Pehle photo chuno!');return;}
document.getElementById('step1').style.display='none';
document.getElementById('step2').style.display='block';
}

function selectType(t){
printType=t;
if(t=='bw'){
amount=5;
document.getElementById('bw').style.border='3px solid red';
document.getElementById('color').style.border='none';
}else{
amount=10;
document.getElementById('color').style.border='3px solid red';
document.getElementById('bw').style.border='none';
}
}

function step3(){
if(!printType){alert('Pehle print type chuno!');return;}
document.getElementById('amt').innerText='Amount: '+amount+' Rupees';
document.getElementById('step2').style.display='none';
document.getElementById('step3').style.display='block';
var f=document.getElementById('photo').files[0];
var fd=new FormData();
fd.append('photo',f);
fd.append('type',printType);
fetch('/save',{method:'POST',body:fd});
}

function step4(){
document.getElementById('step3').style.display='none';
document.getElementById('step4').style.display='block';
fetch('/print',{method:'POST'});
}
</script>
</body>
</html>
